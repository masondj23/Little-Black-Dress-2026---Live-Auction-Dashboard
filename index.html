<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Auction Planner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeede9;
    --text-primary: #1a1a18; --text-secondary: #6b6b67; --text-tertiary: #9b9b96;
    --border: rgba(0,0,0,0.1); --border-md: rgba(0,0,0,0.22);
    --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #085041;
    --amber: #BA7517; --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #501313;
    --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --radius-md: 8px; --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary:#1e1e1c; --bg-secondary:#272725; --bg-tertiary:#2e2e2c;
      --text-primary:#f0efe9; --text-secondary:#a0a09a; --text-tertiary:#6b6b67;
      --border:rgba(255,255,255,0.1); --border-md:rgba(255,255,255,0.22);
      --green-bg:#04342C; --green-text:#9FE1CB;
      --red-bg:#501313; --red-text:#F7C1C1;
      --blue-bg:#042C53; --blue-text:#B5D4F4;
      --purple-bg:#26215C; --purple-text:#CECBF6;
    }
  }
  body { font-family:'Georgia',serif; background:var(--bg-tertiary); color:var(--text-primary); min-height:100vh; padding:2rem 1rem; }
  .page { max-width:980px; margin:0 auto; }
  header { margin-bottom:2rem; display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem; }
  header h1 { font-size:30px; font-weight:normal; letter-spacing:-0.02em; }
  header p { font-size:15px; color:var(--text-secondary); margin-top:5px; font-family:'Courier New',monospace; }
  .sync-badge { font-size:12px; font-family:'Courier New',monospace; padding:6px 12px; border-radius:20px; background:var(--bg-primary); border:0.5px solid var(--border); color:var(--text-tertiary); display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .sync-dot { width:8px; height:8px; border-radius:50%; background:var(--text-tertiary); flex-shrink:0; transition:background 0.3s; }
  .sync-dot.live { background:var(--green); }
  .sync-dot.saving { background:var(--amber); }
  .metrics { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:1.5rem; }
  @media(max-width:600px){.metrics{grid-template-columns:1fr 1fr;}}
  .metric { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1.125rem; }
  .metric-label { font-size:12px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:7px; font-family:'Courier New',monospace; }
  .metric-value { font-size:26px; font-weight:normal; }
  .metric-value.good{color:var(--green);} .metric-value.warn{color:var(--amber);} .metric-value.bad{color:var(--red);}
  .progress-bar{height:5px;background:var(--bg-tertiary);border-radius:3px;margin-top:10px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:3px;transition:width 0.3s;}
  .goal-wrap{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.375rem;margin-bottom:1.75rem;}
  .goal-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .goal-header .lbl{font-size:14px;color:var(--text-secondary);font-family:'Courier New',monospace;text-transform:uppercase;letter-spacing:0.04em;}
  .goal-header .val{font-size:16px;font-weight:bold;}
  .goal-track{height:14px;background:var(--bg-tertiary);border-radius:7px;overflow:hidden;}
  .goal-fill{height:100%;border-radius:7px;transition:width 0.3s,background 0.3s;}
  .goal-note{font-size:13px;color:var(--text-secondary);margin-top:8px;font-family:'Courier New',monospace;}
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);font-family:'Courier New',monospace;margin-bottom:1rem;}
  .packages{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.25rem;}
  @media(max-width:640px){.packages{grid-template-columns:1fr;}}
  .pkg-card{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;}
  .pkg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
  .pkg-name{font-size:16px;font-weight:bold;color:var(--text-primary);background:none;border:none;border-bottom:1px dashed var(--border-md);outline:none;flex:1;padding:3px 0;min-width:0;font-family:'Georgia',serif;}
  .pkg-name:focus{border-bottom-color:var(--green);}
  .pkg-tag{font-size:11px;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;font-family:'Courier New',monospace;}
  .tag-Travel{background:var(--blue-bg);color:var(--blue-text);}
  .tag-Dining{background:var(--green-bg);color:var(--green-text);}
  .tag-Experience{background:var(--purple-bg);color:var(--purple-text);}
  .field-row{display:flex;align-items:center;gap:12px;margin:10px 0;}
  .field-label{font-size:13px;color:var(--text-secondary);width:116px;flex-shrink:0;font-family:'Courier New',monospace;}
  .field-input{flex:1;font-size:16px;font-weight:bold;color:var(--text-primary);background:var(--bg-secondary);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:8px 12px;outline:none;font-family:'Courier New',monospace;}
  .field-input:focus{border-color:var(--border-md);background:var(--bg-primary);}
  .field-input.qty{width:80px;flex:none;}
  .pkg-footer{margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .pkg-profit-label{font-size:12px;color:var(--text-tertiary);font-family:'Courier New',monospace;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px;}
  .pkg-profit-val{font-size:20px;font-weight:bold;}
  .remove-btn{font-size:13px;color:var(--text-tertiary);background:none;border:0.5px solid var(--border);cursor:pointer;padding:6px 12px;border-radius:var(--radius-md);font-family:'Courier New',monospace;}
  .remove-btn:hover{background:var(--red-bg);color:var(--red-text);border-color:var(--red-text);}
  .add-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:2rem;}
  .add-btn{font-size:13px;padding:9px 18px;border:0.5px solid var(--border-md);border-radius:20px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:'Courier New',monospace;}
  .add-btn:hover{background:var(--bg-primary);color:var(--text-primary);}
  .summary{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-tertiary);padding:12px 16px;border-bottom:0.5px solid var(--border);font-family:'Courier New',monospace;font-weight:normal;}
  th.r,td.r{text-align:right;}
  td{padding:12px 16px;border-bottom:0.5px solid var(--border);color:var(--text-primary);font-size:15px;}
  tr:last-child td{border-bottom:none;background:var(--bg-secondary);font-weight:bold;font-size:16px;}
  tr:hover:not(:last-child) td{background:var(--bg-secondary);}
  .loading{text-align:center;padding:4rem 2rem;font-family:'Courier New',monospace;font-size:14px;color:var(--text-tertiary);}
</style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <h1>Live Auction Planner</h1>
      <p>Little Black Dress — DFSA &nbsp;·&nbsp; Goal: $26,000 &nbsp;·&nbsp; Consignment budget: $11,000</p>
    </div>
    <div class="sync-badge">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Connecting...</span>
    </div>
  </header>
  <div id="app"><div class="loading">Loading auction data...</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpLaaQqmiwHp1KAfYu4XjQ3hi5aDb0U0I",
  authDomain: "lbd-auction-2026.firebaseapp.com",
  projectId: "lbd-auction-2026",
  storageBucket: "lbd-auction-2026.firebasestorage.app",
  messagingSenderId: "141707617238",
  appId: "1:141707617238:web:07723a78670922d1173a77"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const docRef = doc(db, "auction", "packages");

const GOAL = 26000, BUDGET = 11000;
let nextId = 20;
let pkgs = [];
let saveTimeout = null;

const DEFAULT_PKGS = [
  {id:1,name:'Flavor Co. dinner',tag:'Dining',consign:0,bid:2000,qty:1},
  {id:2,name:"L'Oca D'Oro dinner",tag:'Dining',consign:1000,bid:2400,qty:2},
  {id:3,name:'Bespoke (no consign)',tag:'Experience',consign:0,bid:3900,qty:1},
  {id:4,name:'Bespoke premium',tag:'Experience',consign:2000,bid:3900,qty:1},
  {id:5,name:'Tuscany vacation',tag:'Travel',consign:2200,bid:4750,qty:2},
  {id:6,name:'Ocean front oasis',tag:'Travel',consign:1395,bid:2800,qty:3},
];

const TEMPLATES = {
  Travel:{name:'Travel package',consign:1395,bid:2800,qty:1},
  Dining:{name:'Private dinner',consign:0,bid:2200,qty:1},
  Experience:{name:'Experience package',consign:1000,bid:3400,qty:1},
};

const fmt = n => '$' + Math.round(n).toLocaleString();
const parseDollar = v => Math.max(0, parseFloat(String(v).replace(/[^0-9.]/g,'')) || 0);
const profit = p => (p.bid - p.consign) * p.qty;
const gross = p => p.bid * p.qty;
const totalProfit = () => pkgs.reduce((s,p) => s+profit(p), 0);
const totalGross = () => pkgs.reduce((s,p) => s+gross(p), 0);
const totalConsign = () => pkgs.reduce((s,p) => s+p.consign*p.qty, 0);

function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot) return;
  dot.className = 'sync-dot' + (status==='live' ? ' live' : status==='saving' ? ' saving' : '');
  lbl.textContent = status==='live' ? 'Live — changes sync instantly' : status==='saving' ? 'Saving...' : 'Offline';
}

function scheduleSave() {
  setSyncStatus('saving');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try { await setDoc(docRef, {pkgs, nextId}); setSyncStatus('live'); }
    catch(e) { setSyncStatus('offline'); }
  }, 800);
}

function buildApp() {
  document.getElementById('app').innerHTML = `
    <div class="metrics" id="metrics"></div>
    <div class="goal-wrap">
      <div class="goal-header"><span class="lbl">Progress toward goal</span><span class="val" id="goal-label"></span></div>
      <div class="goal-track"><div class="goal-fill" id="goal-fill"></div></div>
      <div class="goal-note" id="goal-note"></div>
    </div>
    <div class="section-title">Packages — click any field to edit</div>
    <div class="packages" id="pkg-grid"></div>
    <div class="add-row">
      <button class="add-btn" onclick="window._addPkg('Travel')">+ Travel package</button>
      <button class="add-btn" onclick="window._addPkg('Dining')">+ Dining experience</button>
      <button class="add-btn" onclick="window._addPkg('Experience')">+ Local experience</button>
    </div>
    <div class="section-title">Summary</div>
    <div class="summary"><table id="summary-table"></table></div>`;
}

window._addPkg = function(tag) {
  pkgs.push({...TEMPLATES[tag], id: nextId++, tag});
  renderPackages(); renderMetrics(); renderSummary(); scheduleSave();
};

window._removePkg = function(id) {
  pkgs = pkgs.filter(x => x.id !== id);
  renderPackages(); renderMetrics(); renderSummary(); scheduleSave();
};

function renderMetrics() {
  const tp=totalProfit(),tc=totalConsign(),tg=totalGross(),rem=GOAL-tp;
  const pc=tp>=GOAL?'good':tp>=GOAL*.75?'warn':'bad';
  const cc=tc<=BUDGET?'good':'bad';
  const el=document.getElementById('metrics'); if(!el)return;
  el.innerHTML=`
    <div class="metric"><div class="metric-label">Projected profit</div><div class="metric-value ${pc}">${fmt(tp)}</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,tp/GOAL*100).toFixed(1)}%;background:${tp>=GOAL?'var(--green)':tp>=GOAL*.75?'var(--amber)':'var(--red)'}"></div></div></div>
    <div class="metric"><div class="metric-label">Consignment used</div><div class="metric-value ${cc}">${fmt(tc)}</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,tc/BUDGET*100).toFixed(1)}%;background:${tc<=BUDGET?'var(--green)':'var(--red)'}"></div></div></div>
    <div class="metric"><div class="metric-label">Gross revenue</div><div class="metric-value">${fmt(tg)}</div></div>
    <div class="metric"><div class="metric-label">${rem>0?'Still needed':'Over goal by'}</div><div class="metric-value ${rem>0?'warn':'good'}">${fmt(Math.abs(rem))}</div></div>`;
  const fill=document.getElementById('goal-fill');
  if(fill){fill.style.width=Math.min(100,tp/GOAL*100).toFixed(1)+'%';fill.style.background=tp>=GOAL?'var(--green)':tp>=GOAL*.75?'var(--amber)':'var(--red)';}
  const gl=document.getElementById('goal-label'); if(gl)gl.textContent=fmt(tp)+' / '+fmt(GOAL);
  const gn=document.getElementById('goal-note'); if(gn)gn.textContent=tc>BUDGET?'Consignment over budget by '+fmt(tc-BUDGET):tp>=GOAL?'Goal reached!  '+fmt(BUDGET-tc)+' consignment budget remaining.':fmt(GOAL-tp)+' more profit needed  ·  '+fmt(BUDGET-tc)+' consignment budget remaining';
}

function renderPackages() {
  const grid=document.getElementById('pkg-grid'); if(!grid)return;
  grid.innerHTML='';
  pkgs.forEach(p => {
    const pr=profit(p);
    const card=document.createElement('div');
    card.className='pkg-card';
    card.innerHTML=`
      <div class="pkg-top">
        <input class="pkg-name" type="text" value="${p.name.replace(/"/g,'&quot;')}">
        <span class="pkg-tag tag-${p.tag}">${p.tag}</span>
      </div>
      <div class="field-row"><span class="field-label">Consignment</span><input class="field-input" type="text" value="${fmt(p.consign)}" data-field="consign" data-id="${p.id}"></div>
      <div class="field-row"><span class="field-label">Expected bid</span><input class="field-input" type="text" value="${fmt(p.bid)}" data-field="bid" data-id="${p.id}"></div>
      <div class="field-row"><span class="field-label">Quantity</span><input class="field-input qty" type="number" min="1" max="20" value="${p.qty}" data-field="qty" data-id="${p.id}"></div>
      <div class="pkg-footer">
        <div><div class="pkg-profit-label">Projected profit</div><div class="pkg-profit-val" style="color:${pr>=0?'var(--green)':'var(--red)'}">${fmt(pr)}</div></div>
        <button class="remove-btn" onclick="window._removePkg(${p.id})">Remove</button>
      </div>`;

    card.querySelector('.pkg-name').addEventListener('blur', function() {
      const pk=pkgs.find(x=>x.id===p.id); if(pk&&this.value.trim()){pk.name=this.value.trim(); renderSummary(); scheduleSave();}
    });

    card.querySelectorAll('.field-input').forEach(input => {
      input.addEventListener('blur', function() {
        const pk=pkgs.find(x=>x.id===parseInt(this.dataset.id)); if(!pk)return;
        const field=this.dataset.field;
        pk[field]=field==='qty'?Math.max(1,parseInt(this.value)||1):parseDollar(this.value);
        if(field!=='qty')this.value=fmt(pk[field]);
        renderMetrics(); renderSummary(); scheduleSave();
      });
      input.addEventListener('keydown', function(e){if(e.key==='Enter')this.blur();});
    });

    grid.appendChild(card);
  });
}

function renderSummary() {
  const el=document.getElementById('summary-table'); if(!el)return;
  const tp=totalProfit(),tc=totalConsign(),tg=totalGross();
  el.innerHTML=`<tr><th>Package</th><th class="r">Qty</th><th class="r">Consign/ea</th><th class="r">Exp. bid</th><th class="r">Gross</th><th class="r">Net profit</th></tr>`
    +pkgs.map(p=>`<tr><td>${p.name}</td><td class="r">${p.qty}</td><td class="r">${fmt(p.consign)}</td><td class="r">${fmt(p.bid)}</td><td class="r">${fmt(gross(p))}</td><td class="r" style="color:${profit(p)>=0?'var(--green)':'var(--red)'}">${fmt(profit(p))}</td></tr>`).join('')
    +`<tr><td>Total</td><td></td><td class="r">${fmt(tc)}</td><td></td><td class="r">${fmt(tg)}</td><td class="r" style="color:${tp>=GOAL?'var(--green)':tp>=GOAL*.75?'var(--amber)':'var(--red)'}">${fmt(tp)}</td></tr>`;
}

onSnapshot(docRef, snapshot => {
  setSyncStatus('live');
  if (snapshot.exists()) {
    const data = snapshot.data();
    pkgs = data.pkgs || DEFAULT_PKGS;
    nextId = data.nextId || 20;
  } else {
    pkgs = DEFAULT_PKGS;
    setDoc(docRef, {pkgs, nextId});
  }
  if (!document.getElementById('metrics')) buildApp();
  renderMetrics(); renderPackages(); renderSummary();
}, () => {
  setSyncStatus('offline');
  pkgs = DEFAULT_PKGS;
  buildApp(); renderMetrics(); renderPackages(); renderSummary();
});
</script>
</body>
</html>
